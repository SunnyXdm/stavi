name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck server-core
        run: bun run typecheck
        working-directory: packages/server-core

      - name: Typecheck mobile
        run: bun run typecheck
        working-directory: apps/mobile

      - name: Test
        run: bun test packages/server-core packages/crypto
