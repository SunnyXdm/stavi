<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline';" />
  <title>Stavi Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #161616; }
    #editor {
      height: 100%;
      font-size: 13px;
      /* Match Stavi bg.base token */
      background: #161616;
    }
    /* CodeMirror override — remove default border */
    .cm-editor { height: 100%; }
    .cm-scroller { overflow: auto; }
  </style>
</head>
<body>
  <div id="editor"></div>
  <script src="bundle.js"></script>
</body>
</html>
